name: Limpieza de Enlaces JSON

on:
  workflow_dispatch: 
  push:
    paths:
      - 'movies.json' 

jobs:
  limpiar-y-guardar:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ejecutar script de limpieza
        run: python limpiar_catalogo.py

      - name: Validar formato del JSON resultante
        run: |
          # Esto intentará leer el JSON. Si está roto por algún motivo, el proceso se detendrá aquí 
          # y evitará subir un archivo corrupto a tu repositorio.
          python -m json.tool movies.json > /dev/null
          echo "✅ El JSON principal es válido y seguro para guardar."

      - name: Guardar cambios en GitHub (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Añadir todos los archivos modificados o nuevos (incluyendo la nueva carpeta)
          git add .
          
          # Hacer commit solo si hay cambios
          git commit -m "🤖 Auto-limpieza: dominios filtrados, validados y movidos a carpeta" || echo "No hay cambios para guardar"
          
          # Subir al repositorio
          git push
