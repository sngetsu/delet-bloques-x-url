name: Limpieza de Enlaces JSON

on:
  workflow_dispatch:
    inputs:
      dominios_input:
        description: 'Dominios a eliminar (separados por coma, ej: nuevodominio.com, otro.net)'
        required: true
        type: string

jobs:
  limpiar-y-guardar:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ejecutar script de limpieza
        env:
          DOMINIOS_A_ELIMINAR: ${{ inputs.dominios_input }} 
        run: python limpiar_catalogo.py

      - name: Validar formato del JSON resultante
        run: |
          python -m json.tool movies.json > /dev/null
          echo "✅ El JSON principal es válido y seguro para guardar."

      - name: Guardar cambios en GitHub (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          git commit -m "🤖 Auto-limpieza de dominios dinámicos" || echo "No hay cambios para guardar"
          git push
